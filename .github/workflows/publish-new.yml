name: Publish New AUR Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated package names to publish (optional, if empty will detect all new packages)'
        required: false
        default: ''

jobs:
  detect-new-packages:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      new_packages: ${{ steps.detect.outputs.new_packages }}
      new_packages_json: ${{ steps.detect.outputs.new_packages_json }}
      new_ref: ${{ steps.capture-ref.outputs.new_ref }}
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm jq git base-devel

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create build user
        run: |
          useradd -m -u 1001 builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Detect new packages not in AUR
        id: detect
        run: |
          runuser -u builder -- sh -c '
            packages_dir="packages"
            
            if [ -n "${{ github.event.inputs.packages }}" ]; then
              IFS=, read -ra input_packages <<< "${{ github.event.inputs.packages }}"
              for pkg in "${input_packages[@]}"; do
                pkg=$(echo "$pkg" | xargs)
                if [ -d "${packages_dir}/${pkg}" ]; then
                  new_packages+=("$pkg")
                fi
              done
            else
              while IFS= read -r pkgname; do
                if [ -d "${packages_dir}/${pkgname}" ]; then
                  new_packages+=("$pkgname")
                fi
              done < <(find "$packages_dir" -mindepth 2 -maxdepth 2 -name package.json -exec dirname {} \; | xargs -I{} basename {} | sort)
            fi
            
            if [ ${#new_packages[@]} -eq 0 ]; then
              echo "new_packages=[]" >> "$GITHUB_OUTPUT"
              echo "new_packages_json=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
            echo "Detected new packages: ${new_packages[*]}"
            
            packages_json=$(printf "%s\n" "${new_packages[@]}" | jq -R . | jq -cs "map(select(length > 0))")
            
            new_packages_json=$(jq -cn --argjson pkgs "$packages_json" "
              [range(0; (\$pkgs|length)) | {pkgname: \$pkgs[.], path: (\"packages/\" + \$pkgs[.])}]
            ")
            
            echo "new_packages=${new_packages[*]}" >> "$GITHUB_OUTPUT"
            echo "new_packages_json<<EOF" >> "$GITHUB_OUTPUT"
            printf "%s\n" "$new_packages_json" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          '

      - name: Generate .SRCINFO for new packages
        if: steps.detect.outputs.new_packages != ''
        run: runuser -u builder -- sh -c '
          for pkgname in ${{ steps.detect.outputs.new_packages }}; do
            pkgdir="packages/${pkgname}"
            if [ -f "${pkgdir}/PKGBUILD" ]; then
              cd "$pkgdir"
              makepkg --printsrcinfo > .SRCINFO
              cd - > /dev/null
            fi
          done
        '

      - name: Stage new packages
        if: steps.detect.outputs.new_packages != ''
        run: runuser -u builder -- sh -c '
          for pkgname in ${{ steps.detect.outputs.new_packages }}; do
            pkgdir="packages/${pkgname}"
            if [ -f "${pkgdir}/PKGBUILD" ]; then
              git add "${pkgdir}/PKGBUILD" "${pkgdir}/.SRCINFO" "${pkgdir}/package.json"
            fi
          done
        '

      - name: Commit new packages
        if: steps.detect.outputs.new_packages != ''
        run: runuser -u builder -- sh -c '
          if git diff --cached --quiet; then
            echo "No files to commit"
            exit 0
          fi
          
          git -c user.name="PaloMiku" -c user.email="palomiku@outlook.com" commit -m "Add new AUR packages: ${{ steps.detect.outputs.new_packages }}"
        '

      - name: Capture new ref
        if: steps.detect.outputs.new_packages != ''
        id: capture-ref
        run: runuser -u builder -- sh -c 'echo "new_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"'

  publish-aur:
    needs: detect-new-packages
    if: needs.detect-new-packages.outputs.new_packages != ''
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-new-packages.outputs.new_packages_json) }}
    steps:
      - name: Install publish tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-new-packages.outputs.new_ref }}
          fetch-depth: 0

      - name: Publish package to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: ${{ matrix.package.pkgname }}
          pkgbuild: ./${{ matrix.package.path }}/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Initial package submission"
          ssh_keyscan_types: rsa,ecdsa,ed25519