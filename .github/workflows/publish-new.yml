name: Publish New AUR Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated package names to publish (optional, if empty will detect all new packages)'
        required: false
        default: ''

jobs:
  detect-new-packages:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      has_new_packages: ${{ steps.detect.outputs.has_new_packages }}
      packages_json: ${{ steps.detect.outputs.packages_json }}
      new_packages_json: ${{ steps.detect.outputs.new_packages_json }}
      new_ref: ${{ steps.capture-ref.outputs.new_ref }}
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm jq git base-devel

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create build user
        run: |
          useradd -m -u 1001 builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Detect new packages
        id: detect
        env:
          INPUT_PACKAGES: ${{ github.event.inputs.packages }}
        run: runuser -u builder -- env GITHUB_OUTPUT="$GITHUB_OUTPUT" INPUT_PACKAGES="$INPUT_PACKAGES" sh -lc 'cd "$GITHUB_WORKSPACE" && ./scripts/detect-new-packages.sh'

      - name: Generate .SRCINFO
        if: steps.detect.outputs.has_new_packages == 'true'
        env:
          NEW_PACKAGES_JSON: ${{ steps.detect.outputs.packages_json }}
        run: runuser -u builder -- env NEW_PACKAGES_JSON="$NEW_PACKAGES_JSON" sh -lc 'cd "$GITHUB_WORKSPACE" && ./scripts/generate-srcinfo.sh'

      - name: Stage and commit packages
        if: steps.detect.outputs.has_new_packages == 'true'
        env:
          NEW_PACKAGES_JSON: ${{ steps.detect.outputs.packages_json }}
        run: runuser -u builder -- env NEW_PACKAGES_JSON="$NEW_PACKAGES_JSON" sh -lc 'cd "$GITHUB_WORKSPACE" && ./scripts/stage-new-packages.sh'

      - name: Capture new ref
        if: steps.detect.outputs.has_new_packages == 'true'
        id: capture-ref
        run: runuser -u builder -- sh -lc 'cd "$GITHUB_WORKSPACE" && echo "new_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"'

  publish-aur:
    needs: detect-new-packages
    if: needs.detect-new-packages.outputs.has_new_packages == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-new-packages.outputs.new_packages_json) }}
    steps:
      - name: Install publish tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-new-packages.outputs.new_ref }}
          fetch-depth: 0

      - name: Publish package to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: ${{ matrix.package.pkgname }}
          pkgbuild: ./${{ matrix.package.path }}/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Initial package submission"
          ssh_keyscan_types: rsa,ecdsa,ed25519
