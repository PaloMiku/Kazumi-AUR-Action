name: Auto Update AUR Packages

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  update-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect upstream updates
        id: detect
        run: ./scripts/detect-updates.sh

      - name: Commit updated files to repository
        if: steps.detect.outputs.any_update == 'true'
        env:
          KAZUMI_UPDATE: ${{ steps.detect.outputs.kazumi_update }}
          CLAWX_UPDATE: ${{ steps.detect.outputs.clawx_update }}
          ANIMEKO_UPDATE: ${{ steps.detect.outputs.animeko_update }}
          ECHOMUSIC_UPDATE: ${{ steps.detect.outputs.echomusic_update }}
          SURF_UPDATE: ${{ steps.detect.outputs.surf_update }}
          KAZUMI_LATEST: ${{ steps.detect.outputs.kazumi_latest }}
          CLAWX_LATEST: ${{ steps.detect.outputs.clawx_latest }}
          ANIMEKO_LATEST: ${{ steps.detect.outputs.animeko_latest }}
          ECHOMUSIC_LATEST: ${{ steps.detect.outputs.echomusic_latest }}
          SURF_LATEST: ${{ steps.detect.outputs.surf_latest }}
        run: ./scripts/commit-updates.sh

      - name: Publish kazumi-bin to AUR
        if: steps.detect.outputs.kazumi_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: kazumi-bin
          pkgbuild: ./packages/kazumi-bin/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.detect.outputs.kazumi_latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

      - name: Publish clawx-bin to AUR
        if: steps.detect.outputs.clawx_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: clawx-bin
          pkgbuild: ./packages/clawx-bin/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.detect.outputs.clawx_latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

      - name: Publish animeko-appimage-beta to AUR
        if: steps.detect.outputs.animeko_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: animeko-appimage-beta
          pkgbuild: ./packages/animeko-appimage-beta/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.detect.outputs.animeko_latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

      - name: Publish echomusic-bin to AUR
        if: steps.detect.outputs.echomusic_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: echomusic-bin
          pkgbuild: ./packages/echomusic-bin/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.detect.outputs.echomusic_latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

      - name: Publish deta-surf-appimage to AUR
        if: steps.detect.outputs.surf_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: deta-surf-appimage
          pkgbuild: ./packages/deta-surf-appimage/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.detect.outputs.surf_latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
