name: Auto Update AUR Packages

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  detect-updates:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      any_update: ${{ steps.detect.outputs.any_update }}
      updated_packages: ${{ steps.detect.outputs.updated_packages }}
      updates_json: ${{ steps.detect.outputs.updates_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel jq curl git openssh

      - name: Validate package metadata
        run: ./scripts/validate-packages.sh

      - name: Detect upstream updates
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/detect-updates.sh

      - name: Commit updated files to repository
        if: steps.detect.outputs.any_update == 'true'
        env:
          UPDATED_PACKAGES: ${{ steps.detect.outputs.updated_packages }}
        run: ./scripts/commit-updates.sh

  publish-aur:
    needs: detect-updates
    if: needs.detect-updates.outputs.any_update == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-updates.outputs.updates_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install publish tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh

      - name: Publish package to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: ${{ matrix.package.pkgname }}
          pkgbuild: ./${{ matrix.package.path }}/PKGBUILD
          commit_username: "PaloMiku"
          commit_email: "palomiku@outlook.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ matrix.package.latest }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
